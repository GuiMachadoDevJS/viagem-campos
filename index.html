<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Santos · Família Pelegrino</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&family=Outfit:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --ocean:#0a3d52;--ocean-mid:#1a6b8a;--ocean-light:#3dafd4;
  --sand:#f5efe6;--sand-dark:#e0d5c8;
  --gold:#c9965a;--gold-light:#e8b87a;--dusk:#7c5c3e;
  --foam:#eaf6fb;--green:#2e7d5e;--red:#b83030;
  --text:#1a1a2e;--muted:#6b7280;--white:#ffffff;
  --r:14px;--sb:env(safe-area-inset-bottom,0px);
}
html{scroll-behavior:smooth;}
body{font-family:'Outfit',sans-serif;background:var(--sand);color:var(--text);min-height:100svh;overflow-x:hidden;-webkit-font-smoothing:antialiased;}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:500;background:var(--ocean);display:flex;padding-bottom:var(--sb);border-top:1px solid rgba(255,255,255,0.08);}
.ntab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 0 8px;cursor:pointer;border:none;background:transparent;color:rgba(255,255,255,0.38);gap:3px;transition:color .2s;user-select:none;}
.ntab.on{color:var(--gold-light);}
.ntab:active{background:rgba(255,255,255,0.05);}
.ntab svg{width:21px;height:21px;}
.ntab span{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;}

/* PAGES */
.pg{display:none;}
.pg.on{display:block;}
.pgmap{display:none;flex-direction:column;}
.pgmap.on{display:flex;}

/* HERO */
.hero{position:relative;height:100svh;min-height:560px;background:var(--ocean);display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;padding-bottom:calc(60px + var(--sb));}
.hgrid{position:absolute;inset:0;background-image:linear-gradient(rgba(61,175,212,.07) 1px,transparent 1px),linear-gradient(90deg,rgba(61,175,212,.07) 1px,transparent 1px);background-size:48px 48px;}
.hglow{position:absolute;width:340px;height:340px;background:radial-gradient(circle,rgba(61,175,212,.22) 0%,transparent 70%);top:42%;left:50%;transform:translate(-50%,-50%);animation:gpulse 4s ease-in-out infinite;}
@keyframes gpulse{0%,100%{opacity:.6;transform:translate(-50%,-50%) scale(1);}50%{opacity:1;transform:translate(-50%,-50%) scale(1.1);}}
.hwaves{position:absolute;bottom:calc(60px + var(--sb));left:0;right:0;height:110px;pointer-events:none;}
.hwaves svg{width:100%;height:100%;}
.hcontent{position:relative;z-index:2;text-align:center;padding:0 1.5rem;width:100%;}
.heyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.28em;color:var(--ocean-light);text-transform:uppercase;margin-bottom:1.2rem;opacity:0;animation:fup .7s .2s ease forwards;}
.htitle{font-family:'Cormorant Garamond',serif;font-size:clamp(3.6rem,18vw,6rem);font-weight:300;line-height:.88;color:var(--white);letter-spacing:-.02em;opacity:0;animation:fup .8s .35s ease forwards;}
.htitle em{font-style:italic;color:var(--gold-light);}
.hdate{font-family:'DM Mono',monospace;font-size:10px;color:var(--gold-light);margin-top:1.1rem;opacity:0;animation:fup .8s .5s ease forwards;}
.htrio{display:flex;gap:1.2rem;align-items:center;justify-content:center;margin-top:1.8rem;opacity:0;animation:fup .8s .65s ease forwards;}
.hperson{display:flex;flex-direction:column;align-items:center;gap:5px;}
.havatar{width:50px;height:50px;border-radius:50%;border:1.5px solid rgba(201,150,90,.4);display:flex;align-items:center;justify-content:center;font-size:22px;background:rgba(255,255,255,.04);}
.hname{font-size:11px;font-weight:300;color:rgba(255,255,255,.5);letter-spacing:.08em;}
.hsep{width:1px;height:28px;background:rgba(255,255,255,.12);}
.scrollhint{position:absolute;bottom:calc(80px + var(--sb));left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:6px;opacity:0;animation:fup .8s 1.1s ease forwards;z-index:2;}
.scrollhint span{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.22em;color:rgba(255,255,255,.22);text-transform:uppercase;}
.scrollline{width:1px;height:34px;background:linear-gradient(to bottom,rgba(255,255,255,.25),transparent);animation:sdrop 1.6s ease-in-out infinite;}
@keyframes sdrop{0%{opacity:0;transform:scaleY(0);transform-origin:top;}50%{opacity:1;transform:scaleY(1);}100%{opacity:0;transform:scaleY(0);transform-origin:bottom;}}
@keyframes fup{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

/* STICKY PROGRESS */
.progbar{position:sticky;top:0;z-index:100;background:var(--ocean);padding:10px 16px 11px;}
.progwrap{background:rgba(255,255,255,.1);border-radius:999px;height:3px;overflow:visible;position:relative;}
.progfill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--ocean-light),var(--gold-light));transition:width .6s cubic-bezier(.4,0,.2,1);position:relative;}
.progfill::after{content:'';position:absolute;right:-5px;top:-4px;width:11px;height:11px;border-radius:50%;background:var(--gold-light);box-shadow:0 0 10px var(--gold-light);}
.proglbls{display:flex;justify-content:space-between;margin-top:7px;font-family:'DM Mono',monospace;font-size:9px;color:rgba(255,255,255,.28);letter-spacing:.08em;}
.proglbls .cur{color:var(--gold-light);text-align:center;}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:14px 14px 0;}
.scard{background:var(--white);border-radius:var(--r);padding:11px 6px;text-align:center;border:1px solid var(--sand-dark);}
.snum{font-family:'Cormorant Garamond',serif;font-size:1.75rem;font-weight:300;color:var(--ocean);line-height:1;}
.slbl{font-size:9px;color:var(--muted);margin-top:3px;}

/* STOPS */
.swrap{padding:12px 14px calc(88px + var(--sb));}
.sentry{display:grid;grid-template-columns:54px 1fr;gap:0 9px;opacity:0;transform:translateY(14px);transition:opacity .45s ease,transform .45s ease;}
.sentry.vis{opacity:1;transform:translateY(0);}
.stl{display:flex;flex-direction:column;align-items:center;padding-top:13px;}
.stime{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.04em;margin-bottom:7px;white-space:nowrap;}
.sdot{width:13px;height:13px;border-radius:50%;background:var(--sand-dark);border:2px solid var(--sand-dark);flex-shrink:0;z-index:2;transition:all .4s ease;}
.sdot.done{background:var(--ocean-light);border-color:var(--ocean-light);box-shadow:0 0 0 3px rgba(61,175,212,.15);}
.sdot.cur{background:var(--gold);border-color:var(--gold);animation:dpulse 1.6s ease-in-out infinite;}
@keyframes dpulse{0%,100%{box-shadow:0 0 0 3px rgba(201,150,90,.2),0 0 14px rgba(201,150,90,.35);}50%{box-shadow:0 0 0 7px rgba(201,150,90,.08),0 0 24px rgba(201,150,90,.5);}}
.sconn{width:1px;flex:1;min-height:34px;background:var(--sand-dark);margin-top:3px;transition:background .4s ease;}
.sconn.done{background:var(--ocean-light);opacity:.4;}

/* CARD */
.card{background:var(--white);border-radius:var(--r);padding:13px 14px;margin-bottom:11px;border:1px solid var(--sand-dark);position:relative;overflow:hidden;transition:box-shadow .3s ease;}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--sand-dark);transition:background .4s ease;}
.card.done::before{background:var(--ocean-light);}
.card.cur::before{background:linear-gradient(to bottom,var(--gold),var(--gold-light));}
.card.cur{border-color:rgba(201,150,90,.28);box-shadow:0 5px 22px rgba(201,150,90,.1);}
.card.rte{background:var(--sand);border-style:dashed;border-color:var(--sand-dark);}
.card.rte::before{display:none;}

.chead{display:flex;align-items:flex-start;gap:10px;margin-bottom:9px;}
.cicon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;}
.cmeta{flex:1;min-width:0;}
.ccat{font-family:'DM Mono',monospace;font-size:8.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:2px;}
.cname{font-family:'Cormorant Garamond',serif;font-size:1.22rem;font-weight:400;line-height:1.1;color:var(--text);}
.cname em{font-style:italic;color:var(--ocean-mid);}
.cbadge{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.12em;text-transform:uppercase;padding:3px 8px;border-radius:999px;white-space:nowrap;flex-shrink:0;margin-top:2px;}
.cbadge.done{background:rgba(61,175,212,.1);color:var(--ocean-mid);}
.cbadge.cur{background:rgba(201,150,90,.15);color:var(--dusk);}
.cbadge.up{background:var(--sand);color:var(--muted);}
.caddr{font-size:11px;color:var(--muted);display:flex;align-items:flex-start;gap:4px;margin-bottom:8px;line-height:1.45;}
.caddr svg{flex-shrink:0;margin-top:1px;opacity:.4;}
.ctags{display:flex;flex-wrap:wrap;gap:5px;}
.tag{font-size:10px;padding:3px 9px;border-radius:999px;background:var(--foam);color:var(--ocean-mid);}
.tag.warn{background:#fff4f4;color:var(--red);}
.tag.ok{background:#f0faf6;color:var(--green);}
.tag.gold{background:#fef8f0;color:var(--dusk);}

.mbtn{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:10px;padding:9px 12px;background:var(--ocean);color:var(--white);border-radius:9px;font-size:12px;border:none;cursor:pointer;text-decoration:none;width:100%;transition:background .2s;font-family:'Outfit',sans-serif;}
.mbtn:active{background:var(--ocean-mid);}
.mbtn svg{width:13px;height:13px;flex-shrink:0;}

/* ROUTE CARD */
.rname{font-size:13px;font-weight:500;color:var(--text);margin-bottom:4px;}
.rdesc{font-size:11.5px;color:var(--muted);line-height:1.55;}
.rwarn{font-size:11px;color:var(--red);display:flex;align-items:flex-start;gap:4px;margin-top:4px;}
.rok{font-size:11px;color:var(--green);display:flex;align-items:flex-start;gap:4px;margin-top:4px;}

/* MAP PAGE */
.mhdr{background:var(--ocean);padding:13px 16px 11px;}
.mhtitle{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:300;color:var(--white);margin-bottom:2px;}
.mhsub{font-family:'DM Mono',monospace;font-size:9px;color:rgba(255,255,255,.38);letter-spacing:.12em;text-transform:uppercase;}
.mfwrap{flex:1;overflow:hidden;}
.mfwrap iframe{width:100%;height:100%;border:none;display:block;}
.mopen{display:flex;align-items:center;justify-content:center;gap:7px;padding:11px 16px;background:var(--ocean-mid);color:var(--white);font-size:13px;border:none;cursor:pointer;text-decoration:none;font-family:'Outfit',sans-serif;transition:background .2s;}
.mopen:active{background:var(--ocean);}
.mopen svg{width:15px;height:15px;flex-shrink:0;}
.mwps{background:var(--white);padding:10px 14px;border-top:1px solid var(--sand-dark);display:flex;gap:6px;overflow-x:auto;padding-bottom:calc(10px + var(--sb));scrollbar-width:none;}
.mwps::-webkit-scrollbar{display:none;}
.wp{flex-shrink:0;font-size:10px;font-family:'DM Mono',monospace;padding:5px 10px;border-radius:999px;border:1px solid var(--sand-dark);color:var(--muted);white-space:nowrap;background:var(--sand);}
.wp.done{background:rgba(61,175,212,.1);color:var(--ocean-mid);border-color:rgba(61,175,212,.2);}
.wp.act{background:var(--ocean);color:var(--white);border-color:var(--ocean);}

/* FAB */
.fabwrap{position:fixed;bottom:calc(72px + var(--sb));right:16px;display:flex;flex-direction:column;gap:8px;z-index:400;}
.fab{width:50px;height:50px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(0,0,0,.18);transition:transform .2s;user-select:none;}
.fab:active{transform:scale(.92);}
.fab.adv{background:var(--ocean);color:var(--white);font-size:19px;}
.fab.rst{background:var(--white);color:var(--text);font-size:16px;}

/* TOAST */
.toast{position:fixed;bottom:calc(78px + var(--sb));left:50%;transform:translateX(-50%) translateY(10px);background:var(--ocean);color:var(--white);padding:10px 18px;border-radius:10px;font-size:12.5px;opacity:0;transition:opacity .3s ease,transform .3s ease;pointer-events:none;z-index:600;max-width:88vw;text-align:center;white-space:normal;}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--ocean-light);border-radius:3px;}
</style>
</head>

   cat:'Chegada',name:'Jardim Scyntilla',extra:'',icon:'🏠',bg:'#dff2ea',
   addr:'Jardim Scyntilla, Guarulhos – SP',
   tags:[{t:'Missão cumprida! 🎉',c:'ok'}],
   mq:'Jardim+Scyntilla,+Guarulhos,+SP'},
];

const SO = STOPS.filter(s=>s.type==='stop');
let ci = parseInt(localStorage.getItem('ri')||'-1');
if(ci<0){
  const mn=new Date().getHours()*60+new Date().getMinutes();
  ci=0;SO.forEach((s,i)=>{if(s.min&&mn>=s.min)ci=i;});
  localStorage.setItem('ri',ci);
}

const PIN_SVG = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`;
const EXT_SVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/></svg>`;

function render(){
  const list=document.getElementById('sList');
  list.innerHTML='';let si=0;

  STOPS.forEach((s,idx)=>{
    const el=document.createElement('div');
    el.className='sentry';

    if(s.type==='route'){
      el.innerHTML=`
      <div class="stl">
        <div class="stime" style="font-size:9px">${s.time.split('→')[0]}</div>
        <div class="sdot" style="width:8px;height:8px;background:var(--sand-dark);border-color:var(--sand-dark)"></div>
        <div class="sconn"></div>
      </div>
      <div>
        <div class="card rte">
          <div class="rname">${s.name}</div>
          <div class="rdesc">${s.desc}</div>
          ${s.warn?`<div class="rwarn"><span>⚠</span>${s.warn}</div>`:''}
          ${s.ok?`<div class="rok"><span>✔</span>${s.ok}</div>`:''}
        </div>
      </div>`;
    } else {
      const st=si<ci?'done':si===ci?'cur':'up';
      const myI=si; si++;
      const isLast=idx===STOPS.length-1;
      const bc=st==='done'?'✓ Feito':st==='cur'?'● Agora':'Em breve';
      const cc=st==='done'?'sconn done':'sconn';

      el.innerHTML=`
      <div class="stl">
        <div class="stime">${s.time}</div>
        <div class="sdot ${st}"></div>
        ${!isLast?`<div class="${cc}"></div>`:''}
      </div>
      <div>
        <div class="card ${st}">
          <div class="chead">
            <div class="cicon" style="background:${s.bg}">${s.icon}</div>
            <div class="cmeta">
              <div class="ccat">${s.cat}</div>
              <div class="cname">${s.name}${s.extra?` <em>${s.extra}</em>`:''}</div>
            </div>
            <span class="cbadge ${st==='up'?'up':st}">${bc}</span>
          </div>
          <div class="caddr">${PIN_SVG}${s.addr}</div>
          <div class="ctags">${s.tags.map(t=>`<span class="tag ${t.c}">${t.t}</span>`).join('')}</div>
          ${s.mq?`<a class="mbtn" href="https://www.google.com/maps/search/${s.mq}" target="_blank">${EXT_SVG}Ver no Maps</a>`:''}
        </div>
      </div>`;
    }

    list.appendChild(el);
    requestAnimationFrame(()=>{
      const obs=new IntersectionObserver(ents=>{
        ents.forEach(e=>{if(e.isIntersecting){e.target.classList.add('vis');obs.unobserve(e.target);}});
      },{threshold:.08});
      obs.observe(el);
    });
  });

  // progress
  document.getElementById('pf').style.width=(ci/(SO.length-1)*100)+'%';
  const cs=SO[ci];
  document.getElementById('pc').textContent=cs?`${cs.time} · ${cs.name}`:'–';
  document.getElementById('sdone').textContent=ci;

  // map waypoints
  document.getElementById('mwps').innerHTML=SO.map((s,i)=>{
    const c=i<ci?'wp done':i===ci?'wp act':'wp';
    return `<div class="${c}">${s.time} ${s.name}</div>`;
  }).join('');
}

// Controls
document.getElementById('bAdv').addEventListener('click',()=>{
  if(ci<SO.length-1){
    ci++;localStorage.setItem('ri',ci);render();
    toast(`Próxima: ${SO[ci].name} · ${SO[ci].time}`);
  } else { toast('🎉 Roteiro concluído! Boa volta!'); }
});
document.getElementById('bRst').addEventListener('click',()=>{
  ci=0;localStorage.setItem('ri',0);render();toast('Roteiro reiniciado.');
});

function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('on');
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('on'),3000);
}

// Tabs
let mapLoaded=false;
function switchTab(tab){
  document.getElementById('pgRot').className='pg'+(tab==='rot'?' on':'');
  document.getElementById('pgMap').className='pgmap'+(tab==='map'?' on':'');
  document.getElementById('tRot').classList.toggle('on',tab==='rot');
  document.getElementById('tMap').classList.toggle('on',tab==='map');
  document.getElementById('fw').style.display=tab==='rot'?'flex':'none';

  if(tab==='map'&&!mapLoaded){
    mapLoaded=true;
    const fw=document.getElementById('mfw');
    const h=window.innerHeight-120-60;
    fw.style.height=h+'px';
    const iframe=document.createElement('iframe');
    iframe.loading='lazy';
    iframe.allowFullscreen=true;
    iframe.referrerPolicy='no-referrer-when-downgrade';
    // Embed com direções entre todos os pontos
    iframe.src='https://www.google.com/maps/embed?pb=!1m58!1m12!1m3!1d368073!2d-46.6!3d-23.72!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!4m43!3e0!4m5!1s0x94ce5b84046150d1%3A0x3bd74cc133ad4d36!2sJardim+Scyntila%2C+Guarulhos+-+SP!3m2!1d-23.4428!2d-46.5054!4m5!1s0x94ce5934b23298cf%3A0xd82fcaf98cfe2dc4!2sPadaria+Bella+Paulista%2C+R.+Haddock+Lobo%2C+354+-+Cerqueira+César%2C+São+Paulo+-+SP!3m2!1d-23.5561!2d-46.6601!4m5!1s0x94ce018b6c7ffe67%3A0x4e79a58db49b999f!2sPonta+da+Praia%2C+Santos+-+SP!3m2!1d-23.9821!2d-46.2999!4m5!1s0x94ce018b6878ffcf%3A0xbb6df94153104388!2sChurrascaria+Tert%C3%BAlia%2C+Av.+Bartholomeu+de+Gusm%C3%A3o%2C+187%2C+Santos!3m2!1d-23.9898!2d-46.3069!4m5!1s0x94ce018b484257aa%3A0x310fca49dd67ef8!2sAqu%C3%A1rio+Municipal+de+Santos%2C+Santos+-+SP!3m2!1d-23.9862!2d-46.3081!4m5!1s0x94ce018b4342676b%3A0x77b940bac6f52150!2sMcDonald%27s%2C+Av.+Bartholomeu+de+Gusm%C3%A3o%2C+108%2C+Santos!3m2!1d-23.9809!2d-46.3116!4m5!1s0x94ce5b84046150d1%3A0x3bd74cc133ad4d36!2sJardim+Scyntila%2C+Guarulhos+-+SP!3m2!1d-23.4428!2d-46.5054!5e0!3m2!1spt-BR!2sbr!4v1700000000000';
    fw.appendChild(iframe);
  }
}

// Hero date
function setDate(){
  const n=new Date();
  const d=n.toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'});
  const h=n.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('hdate').textContent=`${d} · ${h}`;
}
setDate();setInterval(setDate,30000);

render();
</script>
</body>
</html>
